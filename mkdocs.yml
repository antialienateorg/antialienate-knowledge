site_name: AntiAlienate Knowledge
site_description: The open-source highway for parental alienation — case studies, evidence, playbooks, jurisdictions, practitioner directory.
site_url: https://knowledge.antialienate.com
repo_url: https://github.com/AntiAlienate/antialienate-knowledge
repo_name: AntiAlienate/antialienate-knowledge
edit_uri: edit/main/
copyright: 'CC BY 4.0 · AntiAlienate.com'

# docs_dir points at the build-time staged `docs/` directory.
# The workflow's "Stage content into docs/" step symlinks each
# root-level content directory into here BEFORE mkdocs runs, so
# source files stay in place at the repo root (preserving all
# external links to /blob/main/<dir>/file.md style URLs) while
# MkDocs sees a clean child-directory layout.
# To rebuild locally: run the staging commands from
# .github/workflows/docs.yml then `mkdocs build --strict --site-dir _site`.
docs_dir: docs
site_dir: _site

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - awesome-pages
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AntiAlienate/antialienate-knowledge
    - icon: fontawesome/solid/globe
      link: https://www.antialienate.com
    - icon: fontawesome/solid/terminal
      link: https://get.antialienate.com

